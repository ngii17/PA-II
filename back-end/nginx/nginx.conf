server {
    listen 80;
    server_name purnama-hotel.duckdns.org;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name purnama-hotel.duckdns.org;
    ssl_certificate /etc/letsencrypt/live/purnama-hotel.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/purnama-hotel.duckdns.org/privkey.pem;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    location /auth/ {
        proxy_pass http://auth-service:8000/;
    }

    location /api/ {
        proxy_pass http://main-backend:8001/api/;
    }

    location /notif/ {
        proxy_pass http://notification-service:8002/;
    }

    location /dashboard {
        proxy_pass http://main-backend:8001;
    }

    location = / {
        proxy_pass http://main-backend:8001;
    }
	
    location /img/ {
    proxy_pass http://main-backend:8001/img/;
    }

    location /storage/ {
    proxy_pass http://main-backend:8001/storage/;
    }
}
