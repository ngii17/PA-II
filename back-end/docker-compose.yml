services:
  auth-service:
    build:
      context: ./auth-service
    container_name: auth-service
    restart: always
    env_file:
      - ./auth-service/.env
    networks:
      - purnama-network

  main-backend:
    build:
      context: ./main-backend
    container_name: main-backend
    restart: always
    env_file:
      - ./main-backend/.env
    networks:
      - purnama-network

  notification-service:
    build:
      context: ./notification-service
    container_name: notification-service
    restart: always
    env_file:
      - ./notification-service/.env
    networks:
      - purnama-network

  notification-worker:
    build:
      context: ./notification-service
    container_name: notification-worker
    restart: always
    env_file:
      - ./notification-service/.env
    command: php artisan queue:work --sleep=3 --tries=3 --max-time=3600
    networks:
      - purnama-network

  main-scheduler:
    build:
      context: ./main-backend
    container_name: main-scheduler
    restart: always
    env_file:
      - ./main-backend/.env
    command: sh -c "while true; do php artisan schedule:run; sleep 60; done"
    networks:
      - purnama-network

  nginx:
    image: nginx:alpine
    container_name: nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - /etc/letsencrypt:/etc/letsencrypt:ro
    networks:
      - purnama-network

networks:
  purnama-network:
    driver: bridge